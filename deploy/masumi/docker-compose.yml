services:
  mizizi-agents:
    build:
      context: ./agents
      dockerfile: Dockerfile
    ports:
      - "8088:8080"
    environment:
      MASUMI_MODE: demo
      HOST: 0.0.0.0
      PORT: 8080
      MIZIZI_CALLBACK_URL: http://host.docker.internal:5173
      MIZIZI_CALLBACK_SECRET: mizizi-dev-callback-secret
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
