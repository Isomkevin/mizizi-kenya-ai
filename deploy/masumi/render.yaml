# Mizizi Masumi agents — Render Blueprint (NOT a Dockerfile)
#
# Apply via: Render Dashboard → New → Blueprint → Blueprint path:
#   deploy/masumi/render.yaml
#
# Do NOT create a "Web Service → Docker" and point Dockerfile Path at this file.
# Mizizi web (TanStack Start) deploys separately; wire MASUMI_* vars there after agents are live.

envVarGroups:
  - name: masumi-preprod-payment
    envVars:
      # Python agents (Pydantic: payment_service_url / payment_api_key)
      - key: PAYMENT_SERVICE_URL
        sync: false
      - key: PAYMENT_API_KEY
        sync: false
      # Mizizi web uses these names — set the same values on your web deployment
      - key: MASUMI_PAYMENT_URL
        sync: false
      - key: MASUMI_PAYMENT_API_KEY
        sync: false

services:
  - type: web
    name: mizizi-masumi-agents
    runtime: docker
    plan: starter
    rootDir: deploy/masumi/agents
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: MASUMI_MODE
        value: demo
      - key: CARDANO_NETWORK
        value: Preprod
      - key: MIZIZI_CALLBACK_URL
        sync: false
      - key: MIZIZI_CALLBACK_SECRET
        sync: false
      - fromGroup: masumi-preprod-payment

  - type: cron
    name: mizizi-masumi-orchestrator
    schedule: "0 */6 * * *"
    runtime: node
    buildCommand: echo "orchestrator cron"
    startCommand: >-
      curl -sf -X POST "$MIZIZI_WEB_URL/api/agents/orchestrator/run"
      -H "x-mizizi-callback-secret: $MASUMI_CALLBACK_SECRET"
    envVars:
      - key: MIZIZI_WEB_URL
        sync: false
      - key: MASUMI_CALLBACK_SECRET
        sync: false
      - key: MASUMI_AGENTS_URL
        sync: false
