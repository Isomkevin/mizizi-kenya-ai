# Mizizi Masumi stack — deploy from this folder only
# Render: New → Blueprint → set Blueprint Path to deploy/masumi/render.yaml
#
# Mizizi web app deploys separately (Lovable/Vercel/Render root). Point MIZIZI_WEB_URL
# at that URL after both are live.

services:
  - type: web
    name: mizizi-masumi-agents
    runtime: docker
    plan: starter
    dockerfilePath: ./deploy/masumi/agents/Dockerfile
    dockerContext: ./deploy/masumi/agents
    envVars:
      - key: MASUMI_MODE
        value: demo
      - key: MIZIZI_CALLBACK_URL
        sync: false
      - key: MIZIZI_CALLBACK_SECRET
        sync: false
      - key: PAYMENT_SERVICE_URL
        sync: false
      - key: PAYMENT_API_KEY
        sync: false

  - type: cron
    name: mizizi-masumi-orchestrator
    schedule: "0 */6 * * *"
    runtime: node
    buildCommand: echo "orchestrator cron"
    startCommand: >-
      curl -sf -X POST "$MIZIZI_WEB_URL/api/agents/orchestrator/run"
      -H "x-mizizi-callback-secret: $MIZIZI_CALLBACK_SECRET"
    envVars:
      - key: MIZIZI_WEB_URL
        sync: false
      - key: MASUMI_CALLBACK_SECRET
        sync: false
