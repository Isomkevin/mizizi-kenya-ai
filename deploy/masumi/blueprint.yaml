# Mizizi Masumi — Render Blueprint (NOT a Dockerfile)
#
# Apply: Render Dashboard → New → Blueprint → Blueprint path:
#   deploy/masumi/blueprint.yaml
#
# NEVER create "Web Service → Docker" and set Dockerfile Path to this file.
# The real Dockerfile is: deploy/masumi/agents/Dockerfile

envVarGroups:
  - name: masumi-preprod-payment
    envVars:
      - key: PAYMENT_SERVICE_URL
        sync: false
      - key: PAYMENT_API_KEY
        sync: false
      - key: MASUMI_PAYMENT_URL
        sync: false
      - key: MASUMI_PAYMENT_API_KEY
        sync: false

services:
  - type: web
    name: mizizi-masumi-agents
    runtime: docker
    plan: starter
    dockerfilePath: ./deploy/masumi/agents/Dockerfile
    dockerContext: ./deploy/masumi/agents
    healthCheckPath: /health
    envVars:
      - key: MASUMI_MODE
        value: demo
      - key: CARDANO_NETWORK
        value: Preprod
      - key: MIZIZI_CALLBACK_URL
        sync: false
      - key: MIZIZI_CALLBACK_SECRET
        sync: false
      - fromGroup: masumi-preprod-payment

  - type: cron
    name: mizizi-masumi-orchestrator
    schedule: "0 */6 * * *"
    runtime: node
    buildCommand: echo "orchestrator cron"
    startCommand: >-
      curl -sf -X POST "$MIZIZI_WEB_URL/api/agents/orchestrator/run"
      -H "x-mizizi-callback-secret: $MASUMI_CALLBACK_SECRET"
    envVars:
      - key: MIZIZI_WEB_URL
        sync: false
      - key: MASUMI_CALLBACK_SECRET
        sync: false
      - key: MASUMI_AGENTS_URL
        sync: false
