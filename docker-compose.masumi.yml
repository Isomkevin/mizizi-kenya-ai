services:
  mizizi-agents:
    build:
      context: ./services/mizizi-agents
      dockerfile: Dockerfile
    ports:
      - "8088:8080"
    environment:
      MASUMI_MODE: demo
      HOST: 0.0.0.0
      PORT: 8080
      MIZIZI_CALLBACK_URL: http://host.docker.internal:5173
      MIZIZI_CALLBACK_SECRET: mizizi-dev-callback-secret
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Optional: Masumi Payment Service (Cardano Preprod)
  # Requires Blockfrost API key + wallet mnemonics — see docs/masumi.md
  # masumi-payment:
  #   image: ghcr.io/masumi-network/masumi-payment-service:latest
  #   ports:
  #     - "3001:3001"
  #   env_file:
  #     - ./services/masumi-payment/.env
