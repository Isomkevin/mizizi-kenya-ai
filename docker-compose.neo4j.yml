# Mizizi local Neo4j (Option A)
# Start:  bun run neo4j:up
# Setup:  bun run neo4j:setup && bun run seed
# Browser: http://localhost:7474  (neo4j / mizizi-local-dev)

services:
  neo4j:
    image: neo4j:5
    container_name: mizizi-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/mizizi-local-dev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -a bolt://localhost:7687 -u neo4j -p mizizi-local-dev 'RETURN 1' || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    restart: unless-stopped

volumes:
  neo4j-data:
  neo4j-logs:
